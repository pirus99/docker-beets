services:
  beets:
    build: .
    container_name: ${CONTAINER_NAME:-beets}
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Berlin}
      - SSH_PASSWORD=${SSH_PASSWORD:-changeme}
      - SSH_PORT=${SSH_PORT:-2222}
    volumes:
      - ${CONFIG_PATH:-./config}:/config
      - ${MUSIC_PATH:-./music}:/music
      - ${DOWNLOADS_PATH:-./downloads}:/downloads
    ports:
      - "${BEETS_WEB_PORT:-8337}:8337"  # Beets web interface
      - "${SSH_PORT:-2222}:${SSH_PORT:-2222}"  # SSH server
    restart: ${RESTART_POLICY:-unless-stopped}
